<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create League</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-body">
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand">LIGALAB</div>
            <nav class="sidebar-menu">
                <a href="{{ url_for('home') }}" class="menu-item">Home</a>
                <a href="{{ url_for('leagues') }}" class="menu-item ">Leagues</a>
                <a href="{{ url_for('teams') }}" class="menu-item active">Teams</a>
                <a href="{{ url_for('players') }}" class="menu-item">Players</a>
                <a href="{{ url_for('schedules') }}" class="menu-item">Schedules</a>
            </nav>
            <div class="sidebar-user-badge">Coach Michelle</div>
        </aside>

        <main class="dashboard-content">
            <div>
                <a href="{{ url_for('leagues')}}" class="back-button"> ← Go Back</a>
            </div>

            <div class="form-card">
                <h2>Save Your Team</h2>

                    <form action="{{ url_for('create_team')}}" method="POST" onsubmit="return validateTeamForm(event)">
        
                <div class="creation-grid">
                    <div class="input-group">
                        <label>Team Name</label>
                        <input type="text" name="team_name" placeholder="Enter team name" required>
                        <span id="team-error" class="error-text"></span>
                    </div>

                    <div class="input-group">
                        <label>Team Color</label>
                        <input type="text" name="team_color" placeholder="Enter team color">
                    </div>

                    <div class="input-group">
                        <label>Coach Name</label>
                        <input type="text" name="team_coach" placeholder="Enter coach name">
                    </div>
                </div> 

                <div class="accordion-header" onclick="toggleSection('league-section')">
                    <h3>Assign to League (Optional)</h3>
                    <span class="caret">&#x2304;</span>
                </div>

                <div id="league-section" class="accordion-content">
                    <div class="input-group">
                        <label>Select Active League</label>
                        <select name="team_league">
                            <option value="Unassigned">--- No League ---</option>
                            {% for league in leagues %}
                                <option value="{{ league.name }}">{{ league.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="accordion-header" onclick="toggleSection('player-section')">
                    <h3>Add Players</h3>
                    <span class="caret">&#x2304;</span>
                </div>
                
                <div id="player-section" class="accordion-content">
                    <div id="players-container-wrapper">
                        <div class="team-builder-row">
                            <div class="dynamic-grid">
                                <div class="input-group">
                                    <label>Player Name</label>
                                    <input type="text" name="player_name[]" placeholder="Enter player name">
                                </div>
                                <div class="input-group">
                                    <label>Player Position</label>
                                    <input type="text" name="player_position[]" placeholder="Enter player position">
                                </div>
                                <div class="input-group">
                                    <label>Player Number</label>
                                    <input type="text" name="player_number[]" placeholder="Enter player number">
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn-secondary-form" onclick="addPlayerRow()">+ Add Another Player</button>
                    <div id="player-add-error" class="error-text"></div>
                </div>

                <button type="submit" class="btn-add-hero">Save Team</button>
            </form>
        </div> 
    </main>

    <script src="{{ url_for('static', filename='create_team.js')}}"></script>
</html>
